services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8111:8000"
    volumes:
      - ./backend/app:/app/app
      - ./assets:/data/assets
      - storage_data:/data/storage
    environment:
      - DOCKER_ENV=1
      - PROJECT_ROOT=/data
      - ASSETS_DIR=/data/assets/models
      - STORAGE_DIR=/data/storage
      - DATABASE_URL=sqlite+aiosqlite:////data/storage/style_transfer.db
      - REDIS_URL=redis://redis:6379/0
      - GPU_SERVICE_URL=http://trellis:8877
      - MESHUP_SERVICE_URL=http://meshup:8878
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

  # --- GPU Services (start with: docker compose --profile gpu up) ---

  trellis:
    build:
      context: .
      dockerfile: docker/Dockerfile.trellis
    ports:
      - "8877:8877"
    profiles: [gpu]
    volumes:
      - /home/jalalirs/.cache/huggingface:/root/.cache/huggingface
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - CUDA_VISIBLE_DEVICES=0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]

  meshup:
    build:
      context: .
      dockerfile: docker/Dockerfile.meshup
    ports:
      - "8878:8878"
    profiles: [gpu]
    volumes:
      - /home/jalalirs/.cache:/root/.cache
    environment:
      - CUDA_VISIBLE_DEVICES=0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1"]
              capabilities: [gpu]

volumes:
  storage_data:
  redis_data:
