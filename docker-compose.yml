services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8111:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend/app:/app/app
      - ./assets:/data/assets
      - storage_data:/data/storage
    environment:
      - DOCKER_ENV=1
      - PROJECT_ROOT=/data
      - ASSETS_DIR=/data/assets/models
      - STORAGE_DIR=/data/storage
      - DATABASE_URL=sqlite+aiosqlite:////data/storage/style_transfer.db
      - REDIS_URL=redis://redis:6379/0
      # Google Cloud (Gemini image styling)
      - GCP_CREDENTIALS_PATH=/app/gcp-credentials.json
      - GCP_PROJECT_ID=m3ajem
      - GCP_LOCATION=us-central1
      # GPU services (internal Docker network)
      - GPU_SERVICE_URL=http://trellis:8877
      - MESHUP_SERVICE_URL=http://meshup:8878
    depends_on:
      - redis
      - trellis
      - meshup

  redis:
    image: redis:7-alpine
    ports:
      - "8113:6379"
    volumes:
      - redis_data:/data

  # --- GPU Services ---

  trellis:
    build:
      context: .
      dockerfile: docker/Dockerfile.trellis
    ports:
      - "8877:8877"
    volumes:
      - model_cache:/root/.cache/huggingface
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - CUDA_VISIBLE_DEVICES=0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]

  meshup:
    build:
      context: .
      dockerfile: docker/Dockerfile.meshup
    ports:
      - "8878:8878"
    volumes:
      - model_cache:/root/.cache
    environment:
      - CUDA_VISIBLE_DEVICES=0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1"]
              capabilities: [gpu]

volumes:
  storage_data:
  redis_data:
  model_cache:
